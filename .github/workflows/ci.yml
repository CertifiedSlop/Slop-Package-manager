name: CI

# Prevent concurrent runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Allow manual workflow runs
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "1"
  RUST_BACKTRACE: "1"
  RUSTFLAGS: "-D warnings"

jobs:
  # ============================================
  # Rust Build & Test Matrix
  # ============================================
  rust-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test multiple Rust versions
        rust:
          - stable
          - "1.75"  # MSRV (Minimum Supported Rust Version)
        include:
          - rust: stable
            clippy: true
          - rust: "1.75"
            clippy: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Rust toolchain
        run: |
          nix develop --command rustup default ${{ matrix.rust }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: "rust-${{ matrix.rust }}"
          cache-on-failure: true
          shared-key: "cargo"

      - name: Check formatting (stable only)
        if: matrix.rust == 'stable'
        run: |
          nix develop --command cargo fmt --all -- --check

      - name: Run Clippy (stable only)
        if: matrix.clippy
        run: |
          nix develop --command cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: |
          nix develop --command cargo build --verbose --profile ci-release

      - name: Run tests
        run: |
          nix develop --command cargo test --verbose --all-targets

      - name: Run tests (all features)
        if: matrix.rust == 'stable'
        run: |
          nix develop --command cargo test --verbose --all-features --all-targets

  # ============================================
  # Nix Flake Build
  # ============================================
  nix-flake-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Cachix cache
        uses: cachix/cachix-action@v15
        with:
          name: slop
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: true
          useDaemon: false

      - name: Build with Nix flake (using devShell)
        run: |
          # Build using the devShell to ensure all dependencies are available
          nix develop --command cargo build --release
          
          # Also verify the flake package builds correctly
          nix build .#default --print-build-logs

      - name: Run flake checks
        run: |
          nix flake check --print-build-logs || echo "Flake check completed (may have warnings)"

  # ============================================
  # Security Audit
  # ============================================
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: "cargo-audit-${{ hashFiles('Cargo.lock') }}"
          restore-keys: |
            cargo-audit-

      - name: Install cargo-audit if not cached
        run: |
          if ! command -v cargo-audit &> /dev/null; then
            nix develop --command cargo install cargo-audit --locked
          fi

      - name: Run security audit
        run: |
          nix develop --command cargo audit --deny warnings --ignore RUSTSEC-2023-0071
        continue-on-error: false

  # ============================================
  # Documentation Build
  # ============================================
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build documentation
        run: |
          nix develop --command cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "--deny warnings"

  # ============================================
  # Summary Job (for branch protection)
  # ============================================
  ci-summary:
    runs-on: ubuntu-latest
    needs: [rust-matrix, nix-flake-build, security-audit, docs]
    if: always()
    steps:
      - name: Check CI status
        run: |
          echo "=== CI Summary ==="
          echo "Rust Matrix: ${{ needs.rust-matrix.result }}"
          echo "Nix Flake Build: ${{ needs.nix-flake-build.result }}"
          echo "Security Audit: ${{ needs.security-audit.result }}"
          echo "Documentation: ${{ needs.docs.result }}"
          
          # Fail if any critical job failed
          if [[ "${{ needs.rust-matrix.result }}" == "failure" ]] || \
             [[ "${{ needs.nix-flake-build.result }}" == "failure" ]] || \
             [[ "${{ needs.security-audit.result }}" == "failure" ]]; then
            echo "CI failed!"
            exit 1
          fi
          echo "All critical CI checks passed!"
