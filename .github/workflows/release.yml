name: Release

# Prevent concurrent release runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - 'v*'
  # Allow manual release creation
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"  # Disable incremental for release builds
  RUST_BACKTRACE: "1"

jobs:
  # ============================================
  # Parse Version from Tag
  # ============================================
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version-no-v: ${{ steps.version.outputs.version-no-v }}
    steps:
      - name: Get version from tag
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION_NO_V="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version-no-v=$VERSION_NO_V" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

  # ============================================
  # Build Release Binaries
  # ============================================
  build-release:
    runs-on: ubuntu-latest
    needs: get-version
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux targets
          - target: x86_64-unknown-linux-gnu
            artifact-name: slop-x86_64-unknown-linux-gnu
            use-cross: false
          - target: x86_64-unknown-linux-musl
            artifact-name: slop-x86_64-unknown-linux-musl
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            artifact-name: slop-aarch64-unknown-linux-gnu
            use-cross: true
          - target: aarch64-unknown-linux-musl
            artifact-name: slop-aarch64-unknown-linux-musl
            use-cross: true
          # macOS targets
          - target: x86_64-apple-darwin
            artifact-name: slop-x86_64-apple-darwin
            use-cross: true
          - target: aarch64-apple-darwin
            artifact-name: slop-aarch64-apple-darwin
            use-cross: true
          # Windows targets
          - target: x86_64-pc-windows-msvc
            artifact-name: slop-x86_64-pc-windows-msvc.exe
            use-cross: false
            os: windows-latest
          - target: x86_64-pc-windows-gnu
            artifact-name: slop-x86_64-pc-windows-gnu.exe
            use-cross: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cross for cross-compilation
        if: matrix.use-cross
        run: |
          nix develop --command cargo install cross --locked

      - name: Set up target-specific dependencies (Linux)
        if: matrix.os == '' && contains(matrix.target, 'linux')
        run: |
          if [[ "${{ matrix.target }}" == *"musl"* ]]; then
            sudo apt-get update && sudo apt-get install -y musl-tools musl-dev
          fi
          if [[ "${{ matrix.target }}" == "aarch64"* ]]; then
            sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: "release-${{ matrix.target }}"
          prefix-key: ${{ needs.get-version.outputs.version }}
          shared-key: "cargo"

      - name: Build release binary (native)
        if: ${{ !matrix.use-cross && matrix.os == '' }}
        run: |
          rustup target add ${{ matrix.target }}
          nix develop --command cargo build \
            --release \
            --profile ci-release \
            --target ${{ matrix.target }} \
            --verbose

      - name: Build release binary (cross)
        if: matrix.use-cross && matrix.os == ''
        run: |
          cross build \
            --release \
            --target ${{ matrix.target }} \
            --verbose

      - name: Build release binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          rustup target add ${{ matrix.target }}
          cargo build `
            --release `
            --profile ci-release `
            --target ${{ matrix.target }} `
            --verbose

      - name: Strip binary (Unix only)
        if: matrix.os == '' && !contains(matrix.target, 'windows')
        run: |
          # Strip the binary for smaller size
          if [[ "${{ matrix.target }}" == *"musl"* ]]; then
            strip -s target/${{ matrix.target }}/release/slop
          else
            strip target/${{ matrix.target }}/release/slop
          fi

      - name: Prepare artifact
        id: prepare
        shell: bash
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          
          # Create release directory
          mkdir -p release-artifacts
          
          if [[ "$TARGET" == *"windows"* ]]; then
            BINARY="target/$TARGET/release/slop.exe"
            ARTIFACT_NAME="slop-$VERSION-$TARGET.exe"
            cp "$BINARY" "release-artifacts/$ARTIFACT_NAME"
          else
            BINARY="target/$TARGET/release/slop"
            ARTIFACT_NAME="slop-$VERSION-$TARGET"
            cp "$BINARY" "release-artifacts/$ARTIFACT_NAME"
          fi
          
          echo "artifact-path=release-artifacts/$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "artifact-name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare.outputs.artifact-name }}
          path: ${{ steps.prepare.outputs.artifact-path }}
          retention-days: 30
          if-no-files-found: error

  # ============================================
  # Create Checksums
  # ============================================
  create-checksums:
    runs-on: ubuntu-latest
    needs: [get-version, build-release]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: slop-*
          merge-multiple: true
          path: release-artifacts

      - name: Generate checksums
        run: |
          cd release-artifacts
          for file in *; do
            if [[ -f "$file" ]]; then
              sha256sum "$file" >> SHA256SUMS.txt
              sha512sum "$file" >> SHA512SUMS.txt
            fi
          done
          cat SHA256SUMS.txt
          cat SHA512SUMS.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: release-artifacts/SHA256SUMS.txt
          retention-days: 30

      - name: Upload SHA512 checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-sha512
          path: release-artifacts/SHA512SUMS.txt
          retention-days: 30

  # ============================================
  # Generate Release Notes
  # ============================================
  generate-release-notes:
    runs-on: ubuntu-latest
    needs: get-version
    outputs:
      release-body: ${{ steps.notes.outputs.body }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || echo "")
          
          echo "## 📦 Release $VERSION" > release-notes.md
          echo "" >> release-notes.md
          
          if [[ -n "$PREV_TAG" ]]; then
            echo "### Changes since $PREV_TAG" >> release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD >> release-notes.md
            echo "" >> release-notes.md
          else
            echo "### Initial Release" >> release-notes.md
            echo "" >> release-notes.md
            echo "First official release of Slop Package Manager!" >> release-notes.md
          fi
          
          echo "" >> release-notes.md
          echo "### Installation" >> release-notes.md
          echo "" >> release-notes.md
          echo '```bash' >> release-notes.md
          echo '# Using Nix' >> release-notes.md
          echo 'nix profile install github:CertifiedSlop/Slop-Package-manager' >> release-notes.md
          echo '' >> release-notes.md
          echo '# Or download the binary for your platform' >> release-notes.md
          echo '```' >> release-notes.md
          
          BODY=$(cat release-notes.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          cat release-notes.md

  # ============================================
  # Create GitHub Release
  # ============================================
  create-release:
    runs-on: ubuntu-latest
    needs: [get-version, build-release, create-checksums, generate-release-notes]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: slop-*
          merge-multiple: true
          path: release-artifacts

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: release-artifacts

      - name: Download SHA512 checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums-sha512
          path: release-artifacts

      - name: List release artifacts
        run: |
          echo "=== Release Artifacts ==="
          ls -la release-artifacts/
          echo ""
          echo "=== Checksums ==="
          cat release-artifacts/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/slop-*
            release-artifacts/SHA256SUMS.txt
            release-artifacts/SHA512SUMS.txt
          body: ${{ needs.generate-release-notes.outputs.release-body }}
          name: "Release ${{ needs.get-version.outputs.version }}"
          tag_name: ${{ needs.get-version.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.get-version.outputs.version, 'alpha') || contains(needs.get-version.outputs.version, 'beta') || contains(needs.get-version.outputs.version, 'rc') }}
          generate_release_notes: false  # We generate our own
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Publish to crates.io (optional)
  # ============================================
  publish-crates:
    runs-on: ubuntu-latest
    needs: [get-version, create-release]
    if: false  # Disabled by default - enable when ready to publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to crates.io
        run: |
          nix develop --command cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ============================================
  # Release Summary
  # ============================================
  release-summary:
    runs-on: ubuntu-latest
    needs: [get-version, build-release, create-checksums, generate-release-notes, create-release]
    if: always()
    steps:
      - name: Release Summary
        run: |
          echo "=== Release Summary ==="
          echo "Version: ${{ needs.get-version.outputs.version }}"
          echo "Build Status: ${{ needs.build-release.result }}"
          echo "Checksums: ${{ needs.create-checksums.result }}"
          echo "Release Notes: ${{ needs.generate-release-notes.result }}"
          echo "GitHub Release: ${{ needs.create-release.result }}"
          echo ""
          
          if [[ "${{ needs.create-release.result }}" == "success" ]]; then
            echo "✅ Release completed successfully!"
            echo "https://github.com/${{ github.repository }}/releases/tag/${{ needs.get-version.outputs.version }}"
          else
            echo "❌ Release failed!"
            exit 1
          fi
